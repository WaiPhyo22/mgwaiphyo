<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Wai Phyo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a0f1e;
      --navy-light: #141e30;
      --accent: #f39c12;
      --accent-dark: #d68910;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0f1e 0%, #141e30 40%, #1a237e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 2.25rem;
    }
    .login-brand .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(243, 156, 18, 0.15);
      border: 1px solid rgba(243, 156, 18, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--accent);
      margin: 0 auto 1rem;
    }
    .login-brand h1 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .login-brand p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 0.8rem 1rem 0.8rem 2.75rem;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }
    .form-input::placeholder { color: rgba(255, 255, 255, 0.2); }
    .form-input:focus {
      border-color: var(--accent);
      background: rgba(243, 156, 18, 0.06);
      box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.15);
    }
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      letter-spacing: 0.2px;
    }
    .btn-login:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(243, 156, 18, 0.4);
    }
    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .error-msg {
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #ff8080;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 0.6rem;
    }
    .error-msg.show { display: flex; }
    .back-link {
      text-align: center;
      margin-top: 1.75rem;
    }
    .back-link a {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .back-link a:hover { color: rgba(255, 255, 255, 0.7); }
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.55rem;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .success-msg {
      background: rgba(40, 167, 69, 0.15);
      border: 1px solid rgba(40, 167, 69, 0.3);
      color: #6fcf97;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 0.6rem;
    }
    .success-msg.show { display: flex; }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="icon"><i class="fas fa-shield-alt"></i></div>
      <h1>Admin Portal</h1>
      <p>Sign in to manage your portfolio</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alerts -->
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText"></span>
    </div>
    <div class="success-msg" id="successMsg">
      <i class="fas fa-check-circle"></i>
      <span id="successText"></span>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-input" id="email" placeholder="admin@example.com" required autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none;">
      <div class="form-group">
        <label class="form-label" for="regEmail">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-input" id="regEmail" placeholder="admin@example.com" required autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-input" id="regPassword" placeholder="Min. 6 characters" required autocomplete="new-password" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regConfirm">Confirm Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-input" id="regConfirm" placeholder="••••••••" required autocomplete="new-password" />
        </div>
      </div>
      <button type="submit" class="btn-login" id="registerBtn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>
  </div>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redirect to dashboard if already logged in
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'admin.html';
    })();

    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const successMsg  = document.getElementById('successMsg');
    const successText = document.getElementById('successText');

    function showError(msg) {
      successMsg.classList.remove('show');
      errorText.textContent = msg;
      errorMsg.classList.add('show');
    }
    function showSuccess(msg) {
      errorMsg.classList.remove('show');
      successText.textContent = msg;
      successMsg.classList.add('show');
    }
    function clearAlerts() {
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
    }

    function switchTab(tab) {
      clearAlerts();
      const isLogin = tab === 'login';
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
      document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
      document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
    }

    // ── Sign In ──────────────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();
      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message === 'Invalid login credentials'
          ? 'Invalid email or password. Please try again.'
          : error.message);
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      } else {
        window.location.href = 'admin.html';
      }
    });

    // ── Register ─────────────────────────────────────────────────────────────
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlerts();
      const registerBtn = document.getElementById('registerBtn');
      const email    = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm  = document.getElementById('regConfirm').value;

      if (password.length < 6) {
        return showError('Password must be at least 6 characters.');
      }
      if (password !== confirm) {
        return showError('Passwords do not match.');
      }

      registerBtn.disabled = true;
      registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';

      const { data, error } = await supabaseClient.auth.signUp({ email, password });

      if (error) {
        showError(error.message);
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      } else {
        if (data.user) {
          await supabaseClient.from('admin_users').insert({ id: data.user.id, email });
        }
        showSuccess('Account created! Check your email to confirm before signing in.');
        document.getElementById('registerForm').reset();
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      }
    });
  </script>
</body>
</html>
